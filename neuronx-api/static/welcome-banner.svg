<svg xmlns="http://www.w3.org/2000/svg" width="480" height="280" viewBox="0 0 480 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="280" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="40" x2="480" y2="40"/>
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="200" x2="480" y2="200"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <line x1="60" y1="0" x2="60" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="420" y1="0" x2="420" y2="280"/>
  </g>

  <!-- Decorative gradient orbs -->
  <circle cx="80" cy="60" r="60" fill="#4F46E5" opacity="0.15"/>
  <circle cx="400" cy="220" r="80" fill="#7C3AED" opacity="0.1"/>
  <circle cx="350" cy="50" r="40" fill="#3B82F6" opacity="0.08"/>

  <!-- Canada maple leaf icon (simplified) -->
  <g transform="translate(200, 55)" filter="url(#glow)">
    <circle cx="40" cy="40" r="32" fill="url(#accent)" opacity="0.9"/>
    <text x="40" y="52" font-family="Arial" font-size="36" fill="white" text-anchor="middle">🍁</text>
  </g>

  <!-- Main text -->
  <text x="240" y="135" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle" letter-spacing="-0.5">
    Immigration Assessment
  </text>

  <!-- Subtitle -->
  <text x="240" y="165" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="13" fill="#94A3B8" text-anchor="middle">
    Visa Master Canada — Powered by NeuronX
  </text>

  <!-- Pipeline preview -->
  <g transform="translate(60, 195)">
    <!-- Pipeline dots -->
    <circle cx="0" cy="12" r="8" fill="#4F46E5" opacity="0.9"/>
    <circle cx="60" cy="12" r="8" fill="#4F46E5" opacity="0.7"/>
    <circle cx="120" cy="12" r="8" fill="#4F46E5" opacity="0.5"/>
    <circle cx="180" cy="12" r="8" fill="#7C3AED" opacity="0.4"/>
    <circle cx="240" cy="12" r="8" fill="#7C3AED" opacity="0.3"/>
    <circle cx="300" cy="12" r="8" fill="#7C3AED" opacity="0.2"/>
    <circle cx="360" cy="12" r="8" fill="#7C3AED" opacity="0.15"/>

    <!-- Connector lines -->
    <line x1="8" y1="12" x2="52" y2="12" stroke="#4F46E5" stroke-width="2" opacity="0.5"/>
    <line x1="68" y1="12" x2="112" y2="12" stroke="#4F46E5" stroke-width="2" opacity="0.4"/>
    <line x1="128" y1="12" x2="172" y2="12" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>
    <line x1="188" y1="12" x2="232" y2="12" stroke="#7C3AED" stroke-width="2" opacity="0.25"/>
    <line x1="248" y1="12" x2="292" y2="12" stroke="#7C3AED" stroke-width="2" opacity="0.2"/>
    <line x1="308" y1="12" x2="352" y2="12" stroke="#7C3AED" stroke-width="2" opacity="0.15"/>

    <!-- Stage labels -->
    <text x="0" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Inquiry</text>
    <text x="60" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Scored</text>
    <text x="120" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Booked</text>
    <text x="180" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Retained</text>
    <text x="240" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Onboard</text>
    <text x="300" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Forms</text>
    <text x="360" y="35" font-family="Inter, Arial" font-size="8" fill="#64748B" text-anchor="middle">Decision</text>
  </g>

  <!-- Bottom tagline -->
  <text x="240" y="265" font-family="Inter, Arial" font-size="10" fill="#475569" text-anchor="middle">
    10 minutes · Confidential · RCIC Licensed (R705959)
  </text>
</svg>
