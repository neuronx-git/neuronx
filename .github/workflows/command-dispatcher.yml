name: command-dispatcher

# Command Dispatcher for Antigravity Operations
# Handles slash commands from issue/PR comments:
#   /status   - Show current operational state
#   /approvals - Show pending approval items
#   /next7    - Show next 7 days priorities
#   /assign   - Log assignment request (requires manual execution)
#   /review   - Log Trae review request (requires manual execution)
#
# Reference: CLAUDE.md Operating Loop

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  issue_comment:
    types: [created]

jobs:
  parse-command:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '/')
    outputs:
      command: ${{ steps.parse.outputs.command }}
      args: ${{ steps.parse.outputs.args }}

    steps:
      - name: Parse Command
        id: parse
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.comment.body.trim();
            const match = body.match(/^\/(\w+)(?:\s+(.*))?$/);

            if (match) {
              const command = match[1].toLowerCase();
              const args = match[2] || '';

              console.log(`Command: ${command}`);
              console.log(`Args: ${args}`);

              core.setOutput('command', command);
              core.setOutput('args', args);
            } else {
              core.setOutput('command', '');
              core.setOutput('args', '');
            }

  execute-status:
    needs: parse-command
    runs-on: ubuntu-latest
    if: needs.parse-command.outputs.command == 'status'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Status
        id: status
        run: |
          echo "## Current Status"
          echo ""

          # Extract key sections from STATUS_LEDGER.md
          if [ -f "STATE/STATUS_LEDGER.md" ]; then
            echo "### Current Objective"
            sed -n '/^## Current Objective/,/^## /p' STATE/STATUS_LEDGER.md | head -20
            echo ""
            echo "### Current Blockers"
            sed -n '/^## Current Blockers/,/^## /p' STATE/STATUS_LEDGER.md | head -15
            echo ""
            echo "### Current Risk Tier"
            sed -n '/^## Current Risk Tier/,/^## /p' STATE/STATUS_LEDGER.md | head -10
          else
            echo "STATUS_LEDGER.md not found"
          fi

      - name: Post Status
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            let status = '';
            if (fs.existsSync('STATE/STATUS_LEDGER.md')) {
              const content = fs.readFileSync('STATE/STATUS_LEDGER.md', 'utf8');

              // Extract Current Objective
              const objMatch = content.match(/## Current Objective[\s\S]*?(?=\n## |$)/);
              const objective = objMatch ? objMatch[0].substring(0, 500) : 'Not found';

              // Extract Active Issues
              const issuesMatch = content.match(/## Active Issues[\s\S]*?(?=\n## |$)/);
              const issues = issuesMatch ? issuesMatch[0].substring(0, 400) : 'Not found';

              // Extract Blockers
              const blockersMatch = content.match(/## Current Blockers[\s\S]*?(?=\n## |$)/);
              const blockers = blockersMatch ? blockersMatch[0].substring(0, 300) : 'Not found';

              status = `### /status Response

${objective}

${issues}

${blockers}

---
*Data from STATE/STATUS_LEDGER.md*`;
            } else {
              status = '### /status Response\n\nSTATE/STATUS_LEDGER.md not found.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: status
            });

  execute-approvals:
    needs: parse-command
    runs-on: ubuntu-latest
    if: needs.parse-command.outputs.command == 'approvals'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post Approvals
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const approvalsDir = 'COCKPIT/artifacts/APPROVALS_QUEUE';
            let response = '### /approvals Response\n\n';

            if (fs.existsSync(approvalsDir)) {
              const files = fs.readdirSync(approvalsDir)
                .filter(f => f.endsWith('.md') && f !== '.gitkeep')
                .sort()
                .reverse()
                .slice(0, 5);

              if (files.length === 0) {
                response += 'No pending approval items found.';
              } else {
                response += '**Pending Approvals:**\n\n';
                for (const file of files) {
                  const content = fs.readFileSync(path.join(approvalsDir, file), 'utf8');
                  const preview = content.substring(0, 200).replace(/\n/g, ' ');
                  response += `- **${file}**: ${preview}...\n`;
                }
              }
            } else {
              response += 'APPROVALS_QUEUE directory not found.';
            }

            response += '\n\n---\n*Data from COCKPIT/artifacts/APPROVALS_QUEUE/*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: response
            });

  execute-next7:
    needs: parse-command
    runs-on: ubuntu-latest
    if: needs.parse-command.outputs.command == 'next7'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Post Next 7 Days
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');

            let response = '### /next7 Response\n\n';

            // Check TEAM_LOG for priorities
            if (fs.existsSync('COCKPIT/WORKSPACE/TEAM_LOG.md')) {
              const content = fs.readFileSync('COCKPIT/WORKSPACE/TEAM_LOG.md', 'utf8');

              // Extract Top 3 Priorities section
              const prioritiesMatch = content.match(/### Top 3 Priorities[\s\S]*?(?=\n### |---|\n## |$)/);
              if (prioritiesMatch) {
                response += prioritiesMatch[0];
              } else {
                response += '*No priorities section found in TEAM_LOG.md*\n';
              }
            } else {
              response += '*TEAM_LOG.md not found*\n';
            }

            response += '\n\n---\n*Data from COCKPIT/WORKSPACE/TEAM_LOG.md*';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: response
            });

  execute-assign:
    needs: parse-command
    runs-on: ubuntu-latest
    if: needs.parse-command.outputs.command == 'assign'

    steps:
      - name: Log Assignment Request
        uses: actions/github-script@v6
        with:
          script: |
            const args = '${{ needs.parse-command.outputs.args }}';

            const response = `### /assign Response

**Assignment Request Logged**

Arguments: \`${args || 'none'}\`

**Note:** True assignment requires Claude Code execution outside GitHub Actions.

**To execute this assignment:**
1. Open Claude Code terminal
2. Run: \`/assign ${args}\`

Or manually:
1. Create GitHub Issue with details
2. Add \`ready-for-factory\` label
3. Factory dispatcher will pick up the work

---
*Command logged at ${new Date().toISOString()}*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: response
            });

  execute-review:
    needs: parse-command
    runs-on: ubuntu-latest
    if: needs.parse-command.outputs.command == 'review'

    steps:
      - name: Log Review Request
        uses: actions/github-script@v6
        with:
          script: |
            const args = '${{ needs.parse-command.outputs.args }}';

            const response = `### /review Response

**Trae Review Request Logged**

Arguments: \`${args || 'none'}\`

**Note:** Trae review requires external invocation.

**To request Trae review:**
1. Follow protocol in \`RUNBOOKS/trae-review.md\`
2. Create TRAE_REQUEST artifact in \`COCKPIT/artifacts/TRAE_REVIEW/\`
3. Invoke Trae with the request
4. Trae will create TRAE_VERDICT artifact

**For PR #${context.issue.number}:**
- Expected artifact: \`TRAE-YYYYMMDD-${context.issue.number}.yml\`
- Location: \`COCKPIT/artifacts/TRAE_REVIEW/\`

---
*Command logged at ${new Date().toISOString()}*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: response
            });

  unknown-command:
    needs: parse-command
    runs-on: ubuntu-latest
    if: |
      needs.parse-command.outputs.command != '' &&
      needs.parse-command.outputs.command != 'status' &&
      needs.parse-command.outputs.command != 'approvals' &&
      needs.parse-command.outputs.command != 'next7' &&
      needs.parse-command.outputs.command != 'assign' &&
      needs.parse-command.outputs.command != 'review'

    steps:
      - name: Unknown Command
        uses: actions/github-script@v6
        with:
          script: |
            const command = '${{ needs.parse-command.outputs.command }}';

            const response = `### Unknown Command: \`/${command}\`

**Available Commands:**

| Command | Description |
|---------|-------------|
| \`/status\` | Show current operational state from STATUS_LEDGER |
| \`/approvals\` | Show pending approval items from APPROVALS_QUEUE |
| \`/next7\` | Show next 7 days priorities from TEAM_LOG |
| \`/assign [task]\` | Log assignment request (manual execution required) |
| \`/review [PR#]\` | Log Trae review request (manual execution required) |

---
*See CLAUDE.md for full operating loop documentation*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: response
            });
