<div class="bg-white rounded-xl border border-slate-200 p-5 sticky top-24">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500">Timeline</h2>
    <span class="text-xs text-slate-400">{{ activities|length }} events</span>
  </div>
  <ol class="relative border-l border-slate-200 ml-2 max-h-[60vh] overflow-y-auto pr-1" id="timeline-list">
    {% for event in activities %}
    <li class="mb-5 ml-4 last:mb-0">
      <div class="absolute -left-1.5 h-3 w-3 rounded-full border-2 border-white
        {% if event.icon == 'upload' %}bg-emerald-500
        {% elif event.icon == 'mail' %}bg-blue-500
        {% elif event.icon == 'note' %}bg-amber-500
        {% elif event.icon == 'play' %}bg-brand-orange
        {% else %}bg-slate-400{% endif %}"></div>
      <time class="block text-[11px] text-slate-400 font-mono">{{ event.ts }}</time>
      <p class="text-sm text-slate-800 leading-snug mt-0.5">{{ event.description }}</p>
      <p class="text-[11px] text-slate-500 mt-0.5">by {{ event.actor }}</p>
    </li>
    {% else %}
    <li class="ml-4 text-sm text-slate-500">No activity yet.</li>
    {% endfor %}
  </ol>
</div>
