# ============================================
# SMART ONBOARDING QUESTIONNAIRES
# ============================================
# One questionnaire structure, program-specific questions.
# The API returns only relevant questions based on program type.
# Edit this file to add/change questions.
# Push to GitHub → Railway auto-deploys in 90s.
#
# SOURCES: Question fields derived from IRCC official application
# requirements and document checklists.
# See docs/09_domain_knowledge/GOVERNMENT_SOURCES.md for citations.
# LAST VERIFIED: 2026-04-16 against canada.ca
# NEXT REVIEW: 2026-05-16 (monthly)
#
# IMPORTANT: These questions collect INTAKE DATA only.
# They do NOT assess eligibility — that is the RCIC's role.
# See docs/04_compliance/trust_boundaries.md.
# ============================================

# Common questions asked for ALL programs (21 fields)
common_questions:
  # ── Personal Information ──
  - key: "full_name"
    label: "Full Legal Name (as on passport)"
    type: "text"
    required: true
    section: "Personal Information"

  - key: "date_of_birth"
    label: "Date of Birth"
    type: "date"
    required: true
    section: "Personal Information"

  - key: "country_of_citizenship"
    label: "Country of Citizenship"
    type: "text"
    required: true
    section: "Personal Information"

  - key: "current_country"
    label: "Current Country of Residence"
    type: "text"
    required: true
    section: "Personal Information"

  - key: "passport_number"
    label: "Passport Number"
    type: "text"
    required: true
    section: "Personal Information"

  - key: "passport_expiry"
    label: "Passport Expiry Date"
    type: "date"
    required: true
    section: "Personal Information"

  # ── Contact ──
  - key: "email"
    label: "Email Address"
    type: "email"
    required: true
    section: "Contact"

  - key: "phone"
    label: "Phone Number (with country code)"
    type: "phone"
    required: true
    section: "Contact"

  # ── Family ──
  - key: "marital_status"
    label: "Marital Status"
    type: "select"
    required: true
    section: "Family"
    options: ["Single", "Married", "Common-Law", "Divorced", "Widowed", "Separated"]

  - key: "has_spouse_on_application"
    label: "Will your spouse/partner be included in this application?"
    type: "boolean"
    required: true
    section: "Family"
    show_if: {key: "marital_status", value: "Single", negate: true}

  - key: "spouse_full_name"
    label: "Spouse/Partner's Full Legal Name"
    type: "text"
    required: false
    section: "Family"
    show_if: {key: "has_spouse_on_application", value: true}

  - key: "spouse_date_of_birth"
    label: "Spouse/Partner's Date of Birth"
    type: "date"
    required: false
    section: "Family"
    show_if: {key: "has_spouse_on_application", value: true}

  - key: "spouse_citizenship"
    label: "Spouse/Partner's Country of Citizenship"
    type: "text"
    required: false
    section: "Family"
    show_if: {key: "has_spouse_on_application", value: true}

  - key: "has_dependents"
    label: "Do you have dependent children (under 22)?"
    type: "boolean"
    required: true
    section: "Family"

  - key: "num_dependents"
    label: "Number of Dependent Children"
    type: "number"
    required: false
    section: "Family"
    show_if: {key: "has_dependents", value: true}

  - key: "dependent_names_dobs"
    label: "List each dependent's name and date of birth"
    type: "textarea"
    required: false
    section: "Family"
    show_if: {key: "has_dependents", value: true}
    help_text: "Format: Name - YYYY-MM-DD, one per line. Needed for medical exam scheduling."

  # ── Background ──
  - key: "criminal_history"
    label: "Have you ever been convicted of a criminal offence in any country?"
    type: "boolean"
    required: true
    section: "Background"

  - key: "previous_refusal"
    label: "Have you ever been refused a visa or immigration application to any country?"
    type: "boolean"
    required: true
    section: "Background"

  - key: "previous_refusal_details"
    label: "If yes, please provide details (country, year, program, reason if known)"
    type: "textarea"
    required: false
    section: "Background"
    show_if: {key: "previous_refusal", value: true}

  - key: "medical_conditions"
    label: "Do you have any medical conditions that may affect your application?"
    type: "boolean"
    required: true
    section: "Background"

  - key: "deportation_history"
    label: "Have you ever been deported, removed, or subject to a removal order from any country?"
    type: "boolean"
    required: true
    section: "Background"

  - key: "countries_lived"
    label: "List all countries you have lived in for 6+ months (other than your current country)"
    type: "textarea"
    required: false
    section: "Background"
    help_text: "Used to determine which police clearance certificates you need. Separate with commas."

  # ── Consent (ICCRC Required) ──
  - key: "consent_true_information"
    label: "I confirm that all information provided is true and accurate to the best of my knowledge"
    type: "boolean"
    required: true
    section: "Consent"

  - key: "consent_representation"
    label: "I authorize this firm to act as my immigration representative"
    type: "boolean"
    required: true
    section: "Consent"

# ============================================
# Program-specific questions
# ============================================
programs:

  Express Entry:
    sections: ["Education", "Work Experience", "Language", "Settlement Funds"]
    questions:
      # ── Education ──
      - key: "education_level"
        label: "Highest Level of Education Completed"
        type: "select"
        required: true
        section: "Education"
        options: ["High School", "1-Year Diploma", "2-Year Diploma", "Bachelor's Degree", "Master's Degree", "PhD/Doctorate", "Professional Degree (Medicine/Law)"]

      - key: "eca_completed"
        label: "Have you completed an Educational Credential Assessment (ECA)?"
        type: "boolean"
        required: true
        section: "Education"

      - key: "eca_organization"
        label: "Which organization issued your ECA?"
        type: "select"
        required: false
        section: "Education"
        show_if: {key: "eca_completed", value: true}
        options: ["WES", "IQAS", "CES", "MCC", "PEBC", "Other"]

      # ── Work Experience ──
      - key: "years_work_experience"
        label: "Total Years of Skilled Work Experience"
        type: "number"
        required: true
        section: "Work Experience"

      - key: "canadian_work_experience"
        label: "Years of Canadian Work Experience (if any)"
        type: "number"
        required: true
        section: "Work Experience"

      - key: "primary_occupation"
        label: "Primary Occupation (Job Title)"
        type: "text"
        required: true
        section: "Work Experience"

      - key: "noc_code"
        label: "NOC Code (if known — look up at canada.ca/noc)"
        type: "text"
        required: false
        section: "Work Experience"

      - key: "has_job_offer"
        label: "Do you have a valid Canadian job offer?"
        type: "boolean"
        required: true
        section: "Work Experience"

      - key: "job_offer_lmia_status"
        label: "Is the job offer supported by an LMIA?"
        type: "select"
        required: false
        section: "Work Experience"
        show_if: {key: "has_job_offer", value: true}
        options: ["LMIA Approved", "LMIA Exempt", "Not Sure"]

      - key: "provincial_nomination"
        label: "Do you have a Provincial Nominee Program (PNP) nomination?"
        type: "boolean"
        required: true
        section: "Work Experience"

      # ── Language ──
      - key: "language_test_type"
        label: "Language Test Taken"
        type: "select"
        required: true
        section: "Language"
        options: ["IELTS General", "CELPIP General", "TEF Canada", "TCF Canada", "Not Yet Taken"]

      - key: "language_listening"
        label: "Listening Score"
        type: "number"
        required: false
        section: "Language"
        show_if: {key: "language_test_type", value: "Not Yet Taken", negate: true}
        help_text: "IELTS: 0-9, CELPIP: 1-12"

      - key: "language_reading"
        label: "Reading Score"
        type: "number"
        required: false
        section: "Language"
        show_if: {key: "language_test_type", value: "Not Yet Taken", negate: true}

      - key: "language_writing"
        label: "Writing Score"
        type: "number"
        required: false
        section: "Language"
        show_if: {key: "language_test_type", value: "Not Yet Taken", negate: true}

      - key: "language_speaking"
        label: "Speaking Score"
        type: "number"
        required: false
        section: "Language"
        show_if: {key: "language_test_type", value: "Not Yet Taken", negate: true}

      - key: "language_overall"
        label: "Overall Score"
        type: "number"
        required: false
        section: "Language"
        show_if: {key: "language_test_type", value: "Not Yet Taken", negate: true}

      - key: "french_ability"
        label: "Do you speak French?"
        type: "select"
        required: true
        section: "Language"
        options: ["No", "Basic", "Intermediate", "Advanced/Fluent"]

      # ── Settlement Funds ──
      - key: "settlement_funds"
        label: "Available Settlement Funds (CAD)"
        type: "number"
        required: true
        section: "Settlement Funds"
        help_text: "Minimum required varies by family size. Single: ~$14,690 CAD"

      - key: "settlement_funds_source"
        label: "Where are your settlement funds held?"
        type: "select"
        required: true
        section: "Settlement Funds"
        options: ["Bank Account (liquid)", "Investments", "Property", "Combination"]

  Spousal Sponsorship:
    sections: ["Sponsor Information", "Sponsor Financial", "Relationship", "Applicant Status"]
    questions:
      # ── Sponsor Information ──
      - key: "sponsor_name"
        label: "Sponsor's Full Legal Name"
        type: "text"
        required: true
        section: "Sponsor Information"

      - key: "sponsor_status"
        label: "Sponsor's Immigration Status in Canada"
        type: "select"
        required: true
        section: "Sponsor Information"
        options: ["Canadian Citizen", "Permanent Resident"]

      - key: "sponsor_province"
        label: "Sponsor's Province of Residence"
        type: "select"
        required: true
        section: "Sponsor Information"
        options: ["Ontario", "British Columbia", "Alberta", "Quebec", "Manitoba", "Saskatchewan", "Nova Scotia", "New Brunswick", "Newfoundland", "PEI", "Northwest Territories", "Yukon", "Nunavut"]

      - key: "previous_sponsorship"
        label: "Has the sponsor previously sponsored someone?"
        type: "boolean"
        required: true
        section: "Sponsor Information"

      - key: "sponsor_previous_marriage"
        label: "Was the sponsor previously married to someone else?"
        type: "boolean"
        required: true
        section: "Sponsor Information"

      # ── Sponsor Financial ──
      - key: "sponsor_annual_income"
        label: "Sponsor's Annual Income (CAD)"
        type: "number"
        required: true
        section: "Sponsor Financial"
        help_text: "Used to verify Low Income Cut-off (LICO) requirement"

      - key: "sponsor_income_source"
        label: "Sponsor's Primary Income Source"
        type: "select"
        required: true
        section: "Sponsor Financial"
        options: ["Employment", "Self-Employment", "Pension/Benefits", "Investment Income", "Other"]

      # ── Relationship ──
      - key: "relationship_type"
        label: "Type of Relationship"
        type: "select"
        required: true
        section: "Relationship"
        options: ["Married", "Common-Law (12+ months cohabitation)", "Conjugal Partner"]

      - key: "marriage_date"
        label: "Date of Marriage / Start of Common-Law Relationship"
        type: "date"
        required: true
        section: "Relationship"

      - key: "relationship_how_met"
        label: "How did you and your sponsor meet?"
        type: "select"
        required: true
        section: "Relationship"
        options: ["In Person", "Online/Dating App", "Introduced by Family", "Work/School", "Other"]

      - key: "relationship_duration_months"
        label: "How long have you been in this relationship? (months)"
        type: "number"
        required: true
        section: "Relationship"

      - key: "met_in_person"
        label: "Have you and your sponsor met in person?"
        type: "boolean"
        required: true
        section: "Relationship"

      # ── Applicant Status ──
      - key: "applicant_in_canada"
        label: "Is the applicant currently in Canada?"
        type: "boolean"
        required: true
        section: "Applicant Status"

      - key: "applicant_current_status"
        label: "Applicant's Current Immigration Status"
        type: "select"
        required: true
        section: "Applicant Status"
        options: ["Outside Canada", "Visitor", "Student", "Worker", "Refugee Claimant", "No Status (Undocumented)", "Other"]

      - key: "applicant_wants_open_work_permit"
        label: "Does the applicant want to apply for an Open Work Permit while sponsorship is processing?"
        type: "boolean"
        required: false
        section: "Applicant Status"
        show_if: {key: "applicant_in_canada", value: true}

  Work Permit:
    sections: ["Employment", "Employer", "Employment Details", "Current Status"]
    questions:
      # ── Employment ──
      - key: "has_job_offer"
        label: "Do you have a job offer from a Canadian employer?"
        type: "boolean"
        required: true
        section: "Employment"

      - key: "work_permit_type"
        label: "Type of Work Permit Sought"
        type: "select"
        required: true
        section: "Employment"
        options: ["Employer-Specific", "Open Work Permit", "PGWP", "Spousal Open Work Permit", "IEC Working Holiday", "Intra-Company Transfer", "CUSMA/NAFTA"]

      - key: "job_title"
        label: "Job Title"
        type: "text"
        required: true
        section: "Employment"

      - key: "noc_code"
        label: "NOC Code (if known)"
        type: "text"
        required: false
        section: "Employment"

      # ── Employer ──
      - key: "employer_name"
        label: "Canadian Employer Name"
        type: "text"
        required: false
        section: "Employer"
        show_if: {key: "has_job_offer", value: true}

      - key: "employer_province"
        label: "Province of Employment"
        type: "text"
        required: false
        section: "Employer"
        show_if: {key: "has_job_offer", value: true}

      - key: "lmia_status"
        label: "LMIA Status"
        type: "select"
        required: true
        section: "Employer"
        options: ["LMIA Approved", "LMIA Pending", "LMIA Exempt", "Not Sure", "Not Applicable"]

      # ── Employment Details ──
      - key: "employment_start_date"
        label: "Expected Employment Start Date"
        type: "date"
        required: false
        section: "Employment Details"
        show_if: {key: "has_job_offer", value: true}

      - key: "employment_salary"
        label: "Annual Salary (CAD)"
        type: "number"
        required: false
        section: "Employment Details"
        show_if: {key: "has_job_offer", value: true}

      - key: "employment_duration_months"
        label: "Employment Contract Duration (months)"
        type: "number"
        required: false
        section: "Employment Details"
        show_if: {key: "has_job_offer", value: true}

      # ── Current Status ──
      - key: "currently_in_canada"
        label: "Are you currently in Canada?"
        type: "boolean"
        required: true
        section: "Current Status"

      - key: "current_immigration_status"
        label: "Current Immigration Status"
        type: "select"
        required: true
        section: "Current Status"
        options: ["Outside Canada", "Visitor", "Student", "Worker (current permit)", "PR Holder", "No Status", "Other"]

      - key: "current_permit_expiry"
        label: "Current Permit/Status Expiry Date"
        type: "date"
        required: false
        section: "Current Status"
        show_if: {key: "currently_in_canada", value: true}

  Study Permit:
    sections: ["Study Plans", "Finances", "Eligibility"]
    questions:
      # ── Study Plans ──
      - key: "dli_name"
        label: "Name of Designated Learning Institution (DLI)"
        type: "text"
        required: true
        section: "Study Plans"

      - key: "program_name"
        label: "Program of Study"
        type: "text"
        required: true
        section: "Study Plans"

      - key: "program_duration"
        label: "Program Duration"
        type: "select"
        required: true
        section: "Study Plans"
        options: ["Less than 6 months", "6 months - 1 year", "1-2 years", "2-3 years", "3-4 years", "4+ years"]

      - key: "has_acceptance_letter"
        label: "Do you have a Letter of Acceptance from the DLI?"
        type: "boolean"
        required: true
        section: "Study Plans"

      - key: "studying_in_quebec"
        label: "Will you be studying in Quebec?"
        type: "boolean"
        required: true
        section: "Study Plans"

      - key: "has_caq"
        label: "Do you have a CAQ (Certificat d'acceptation du Quebec)?"
        type: "boolean"
        required: false
        section: "Study Plans"
        show_if: {key: "studying_in_quebec", value: true}

      - key: "post_study_plan"
        label: "What are your plans after completing your studies?"
        type: "select"
        required: true
        section: "Study Plans"
        options: ["Return to Home Country", "Apply for Work Permit (PGWP)", "Apply for PR", "Not Sure Yet"]

      # ── Finances ──
      - key: "tuition_amount"
        label: "Annual Tuition (CAD)"
        type: "number"
        required: true
        section: "Finances"

      - key: "funding_source"
        label: "How will you fund your studies?"
        type: "select"
        required: true
        section: "Finances"
        options: ["Personal Savings", "Family Support", "Scholarship", "Student Loan", "GIC (SDS Stream)", "Combination"]

      - key: "has_gic"
        label: "Have you purchased a GIC (Guaranteed Investment Certificate)?"
        type: "boolean"
        required: false
        section: "Finances"

      - key: "total_funds_available"
        label: "Total Funds Available for Studies + Living Expenses (CAD)"
        type: "number"
        required: true
        section: "Finances"
        help_text: "Include tuition + living expenses for first year (~$20,635 CAD living costs outside Quebec)"

      # ── Eligibility ──
      - key: "previous_education_level"
        label: "Highest Education Completed (before this program)"
        type: "select"
        required: true
        section: "Eligibility"
        options: ["High School", "Diploma/Certificate", "Bachelor's Degree", "Master's Degree", "PhD", "Other"]

  LMIA:
    sections: ["Employer Details", "Position Details"]
    questions:
      - key: "employer_name"
        label: "Employer Business Name"
        type: "text"
        required: true
        section: "Employer Details"
      - key: "employer_province"
        label: "Province of Employment"
        type: "text"
        required: true
        section: "Employer Details"
      - key: "employer_industry"
        label: "Industry Sector"
        type: "select"
        required: true
        section: "Employer Details"
        options: ["Technology", "Healthcare", "Agriculture", "Hospitality", "Construction", "Manufacturing", "Retail", "Other"]
      - key: "position_title"
        label: "Position to be Filled"
        type: "text"
        required: true
        section: "Position Details"
      - key: "position_salary"
        label: "Proposed Annual Salary (CAD)"
        type: "number"
        required: true
        section: "Position Details"
      - key: "lmia_stream"
        label: "LMIA Stream"
        type: "select"
        required: true
        section: "Position Details"
        options: ["High-Wage", "Low-Wage", "Global Talent Stream", "Agricultural", "Caregiver", "Permanent Residence"]
      - key: "recruitment_completed"
        label: "Has the employer completed 4 weeks of recruitment for Canadian workers?"
        type: "boolean"
        required: true
        section: "Position Details"

  PR Renewal:
    sections: ["Residency", "Travel History"]
    questions:
      - key: "pr_card_expiry"
        label: "Current PR Card Expiry Date"
        type: "date"
        required: true
        section: "Residency"
      - key: "days_in_canada"
        label: "Estimated Days Physically Present in Canada (Last 5 Years)"
        type: "number"
        required: true
        section: "Residency"
        help_text: "Minimum 730 days required"
      - key: "travel_outside_canada"
        label: "Have you travelled outside Canada in the last 5 years?"
        type: "boolean"
        required: true
        section: "Travel History"
      - key: "longest_absence_months"
        label: "Longest single absence from Canada (months)"
        type: "number"
        required: false
        section: "Travel History"
        show_if: {key: "travel_outside_canada", value: true}
      - key: "employed_abroad_canadian_company"
        label: "Were you employed abroad by a Canadian company during any absence?"
        type: "boolean"
        required: false
        section: "Travel History"
        show_if: {key: "travel_outside_canada", value: true}

  Citizenship:
    sections: ["Eligibility", "Tax & Language"]
    questions:
      - key: "pr_start_date"
        label: "Date You Became a Permanent Resident"
        type: "date"
        required: true
        section: "Eligibility"
      - key: "days_in_canada_as_pr"
        label: "Days Physically Present in Canada as PR (Last 5 Years)"
        type: "number"
        required: true
        section: "Eligibility"
        help_text: "Minimum 1,095 days required"
      - key: "filed_taxes"
        label: "Have You Filed Canadian Income Taxes for at Least 3 of the Last 5 Years?"
        type: "boolean"
        required: true
        section: "Tax & Language"
      - key: "tax_years_filed"
        label: "Which tax years have you filed? (e.g., 2023, 2024, 2025)"
        type: "text"
        required: false
        section: "Tax & Language"
        show_if: {key: "filed_taxes", value: true}
      - key: "language_test_taken"
        label: "Have You Taken a Language Test (CLB 4+)?"
        type: "boolean"
        required: true
        section: "Tax & Language"
      - key: "citizenship_language_score"
        label: "CLB Level Achieved"
        type: "select"
        required: false
        section: "Tax & Language"
        show_if: {key: "language_test_taken", value: true}
        options: ["CLB 4", "CLB 5", "CLB 6", "CLB 7", "CLB 8+", "Not Sure"]
      - key: "name_changed_since_pr"
        label: "Has your name changed since becoming a Permanent Resident?"
        type: "boolean"
        required: true
        section: "Eligibility"

  Visitor Visa:
    sections: ["Visit Details", "Host & Ties", "Financial"]
    questions:
      - key: "purpose_of_visit"
        label: "Purpose of Visit"
        type: "select"
        required: true
        section: "Visit Details"
        options: ["Tourism", "Visiting Family/Friends", "Business Meeting", "Conference/Event", "Medical Treatment", "Super Visa (Parent/Grandparent)", "Other"]
      - key: "planned_duration"
        label: "Planned Duration of Stay"
        type: "select"
        required: true
        section: "Visit Details"
        options: ["Less than 2 weeks", "2-4 weeks", "1-3 months", "3-6 months", "6+ months (Super Visa)"]
      - key: "previous_visits_canada"
        label: "Have You Previously Visited Canada?"
        type: "boolean"
        required: true
        section: "Visit Details"
      # ── Host & Ties ──
      - key: "host_in_canada"
        label: "Do You Have a Host in Canada?"
        type: "boolean"
        required: true
        section: "Host & Ties"
      - key: "host_name"
        label: "Host's Full Name"
        type: "text"
        required: false
        section: "Host & Ties"
        show_if: {key: "host_in_canada", value: true}
      - key: "host_relationship"
        label: "Your Relationship to the Host"
        type: "select"
        required: false
        section: "Host & Ties"
        show_if: {key: "host_in_canada", value: true}
        options: ["Parent", "Child", "Sibling", "Extended Family", "Friend", "Business Contact", "Other"]
      - key: "employment_in_home_country"
        label: "Are you currently employed in your home country?"
        type: "boolean"
        required: true
        section: "Host & Ties"
        help_text: "Demonstrates ties to home country"
      - key: "owns_property_home_country"
        label: "Do you own property in your home country?"
        type: "boolean"
        required: true
        section: "Host & Ties"
      # ── Financial ──
      - key: "funds_for_visit"
        label: "Total Funds Available for This Visit (CAD)"
        type: "number"
        required: true
        section: "Financial"
      - key: "flight_booked"
        label: "Have you booked your flight?"
