<svg xmlns="http://www.w3.org/2000/svg" width="480" height="260" viewBox="0 0 480 260">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <rect width="480" height="260" rx="16" fill="url(#bg2)"/>

  <!-- Abstract wave shapes -->
  <path d="M0,180 Q120,140 240,170 Q360,200 480,160 L480,260 L0,260 Z" fill="white" opacity="0.05"/>
  <path d="M0,200 Q120,170 240,190 Q360,210 480,180 L480,260 L0,260 Z" fill="white" opacity="0.03"/>

  <!-- Floating dots pattern -->
  <circle cx="50" cy="40" r="3" fill="white" opacity="0.2"/>
  <circle cx="120" cy="70" r="2" fill="white" opacity="0.15"/>
  <circle cx="200" cy="30" r="4" fill="white" opacity="0.1"/>
  <circle cx="330" cy="55" r="3" fill="white" opacity="0.2"/>
  <circle cx="430" cy="35" r="2" fill="white" opacity="0.15"/>
  <circle cx="400" cy="80" r="3" fill="white" opacity="0.1"/>
  <circle cx="70" cy="110" r="2" fill="white" opacity="0.12"/>
  <circle cx="450" cy="140" r="4" fill="white" opacity="0.08"/>

  <!-- Shield icon with checkmark -->
  <g transform="translate(210, 30)">
    <path d="M30,0 L55,10 L55,35 Q55,55 30,65 Q5,55 5,35 L5,10 Z" fill="white" opacity="0.15" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <text x="30" y="45" font-size="28" text-anchor="middle">✅</text>
  </g>

  <!-- Main text -->
  <text x="240" y="130" font-family="Inter, Helvetica, Arial" font-weight="800" font-size="28" fill="white" text-anchor="middle" letter-spacing="-1">
    Start Your Assessment
  </text>

  <!-- Subtitle with emphasis -->
  <text x="240" y="160" font-family="Inter, Arial" font-weight="400" font-size="14" fill="rgba(255,255,255,0.8)" text-anchor="middle">
    Smart intake for Canadian immigration applications
  </text>

  <!-- Feature pills -->
  <g transform="translate(65, 185)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="white" opacity="0.15"/>
    <text x="50" y="18" font-family="Inter, Arial" font-weight="600" font-size="10" fill="white" text-anchor="middle">🎯 AI-Scored</text>
  </g>
  <g transform="translate(180, 185)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="white" opacity="0.15"/>
    <text x="60" y="18" font-family="Inter, Arial" font-weight="600" font-size="10" fill="white" text-anchor="middle">📋 Auto-Checklist</text>
  </g>
  <g transform="translate(315, 185)">
    <rect x="0" y="0" width="100" height="28" rx="14" fill="white" opacity="0.15"/>
    <text x="50" y="18" font-family="Inter, Arial" font-weight="600" font-size="10" fill="white" text-anchor="middle">🔒 Confidential</text>
  </g>

  <!-- Bottom bar -->
  <rect x="40" y="230" width="400" height="1" fill="white" opacity="0.1"/>
  <text x="240" y="248" font-family="Inter, Arial" font-weight="500" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    Visa Master Canada · Powered by NeuronX
  </text>
</svg>
