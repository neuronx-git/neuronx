# Field value transformers
# Some IRCC fields need value conversion from questionnaire format
transformers:
  marital_status:
    "Single": "01"
    "Married": "02"
    "Common-Law": "03"
    "Divorced": "04"
    "Widowed": "06"
    "Separated": "05"
  boolean_to_yesno:
    true: "Yes"
    false: "No"

