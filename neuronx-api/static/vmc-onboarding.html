<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMC Immigration Assessment | Visa Master Canada</title>
  <meta name="description" content="Complete your immigration assessment with Visa Master Canada. Get matched with the right RCIC for your case.">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif; background: #F8FAFC; }
    #container { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #fff; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
    #header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; background: #1E3A5F; color: #fff; }
    #avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); }
    #bot-name { font-weight: 600; font-size: 15px; }
    #bot-status { font-size: 12px; opacity: 0.7; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
    .msg.bot { background: #1E3A5F; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.user { background: #E8380D; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-img { max-width: 240px; border-radius: 12px; align-self: flex-start; animation: fadeIn 0.3s ease; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 8px; animation: fadeIn 0.3s ease; }
    .choice-btn { padding: 10px 20px; border: 2px solid #1E3A5F; border-radius: 24px; background: #fff; color: #1E3A5F; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .choice-btn:hover { background: #1E3A5F; color: #fff; transform: translateY(-1px); }
    .input-row { display: flex; gap: 8px; animation: fadeIn 0.3s ease; }
    .text-input { flex: 1; padding: 12px 16px; border: 2px solid #E2E8F0; border-radius: 24px; font-size: 14px; outline: none; font-family: inherit; transition: border-color 0.2s; }
    .text-input:focus { border-color: #1E3A5F; }
    .send-btn { padding: 10px 20px; background: #1E3A5F; color: #fff; border: none; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .send-btn:hover { background: #15304F; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 520px) { #container { max-width: 100%; box-shadow: none; } }
  </style>
  <script>
    // Lightweight custom Typebot renderer — talks directly to the viewer sendMessage API
    // Bypasses CDN cookie issues and broken Railway SSR
    const API = "https://viewer-production-366c.up.railway.app/api/v1";
    let sessionId = null;

    async function sendMessage(message) {
      const body = sessionId
        ? { sessionId, message }
        : { startParams: { typebot: "vmc-onboarding" } };
      const r = await fetch(`${API}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      return r.json();
    }

    function renderMessages(data) {
      const chat = document.getElementById("chat");
      for (const msg of data.messages || []) {
        if (msg.type === "text") {
          const rt = msg.content?.richText || [];
          const text = rt.map(p => p.children?.map(c => c.text || "").join("")).join("\n");
          if (text.trim()) {
            const div = document.createElement("div");
            div.className = "msg bot";
            div.textContent = text;
            chat.appendChild(div);
          }
        } else if (msg.type === "image") {
          const img = document.createElement("img");
          img.className = "msg-img";
          img.src = msg.content?.url || "";
          img.alt = "Welcome";
          chat.appendChild(img);
        }
      }
      // Render input
      if (data.input) {
        sessionId = data.sessionId;
        if (data.input.type === "choice input") {
          const btnRow = document.createElement("div");
          btnRow.className = "btn-row";
          for (const item of data.input.items || []) {
            const btn = document.createElement("button");
            btn.className = "choice-btn";
            btn.textContent = item.content;
            btn.onclick = () => handleChoice(item.content, btnRow);
            btnRow.appendChild(btn);
          }
          chat.appendChild(btnRow);
        } else if (data.input.type === "text input" || data.input.type === "email input") {
          const row = document.createElement("div");
          row.className = "input-row";
          const inp = document.createElement("input");
          inp.type = data.input.type === "email input" ? "email" : "text";
          inp.placeholder = data.input.options?.labels?.placeholder || "Type your answer...";
          inp.className = "text-input";
          const send = document.createElement("button");
          send.className = "send-btn";
          send.textContent = "Send";
          send.onclick = () => handleText(inp.value, row);
          inp.onkeydown = (e) => { if (e.key === "Enter") send.click(); };
          row.appendChild(inp);
          row.appendChild(send);
          chat.appendChild(row);
          inp.focus();
        }
      }
      chat.scrollTop = chat.scrollHeight;
    }

    async function handleChoice(value, container) {
      container.remove();
      addUserMsg(value);
      const data = await sendMessage(value);
      renderMessages(data);
    }

    async function handleText(value, container) {
      if (!value.trim()) return;
      container.remove();
      addUserMsg(value);
      const data = await sendMessage(value);
      renderMessages(data);
    }

    function addUserMsg(text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = "msg user";
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    // Start on load
    window.addEventListener("DOMContentLoaded", async () => {
      const data = await sendMessage(null);
      renderMessages(data);
    });
  </script>
</head>
<body>
  <div id="container">
    <div id="header">
      <img src="/static/avatar.png" alt="VMC" id="avatar">
      <div>
        <div id="bot-name">VMC Immigration Assistant</div>
        <div id="bot-status">Online</div>
      </div>
    </div>
    <div id="chat"></div>
  </div>
</body>
</html>
